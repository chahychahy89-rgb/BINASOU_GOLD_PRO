</div>
            <button class="btn-action" onclick="alert('الإعلانات ستتوفر قريباً جداً!')">قريباً</button>
        </div>
        
        <div class="task-card">
            <div class="task-info">
                <span class="task-title">الانضمام لقناتنا</span>
                <span class="task-reward">+2,500 عملة</span>
            </div>
            <button class="btn-action" onclick="window.open('https://t.me/your_channel', '_blank')">انضم</button>
        </div>
    </div>
</div>

<nav class="nav-bar">
    <div id="tab1" class="nav-item active" onclick="switchTab('mining-sec', 'tab1')">⛏️ تعدين</div>
    <div id="tab2" class="nav-item" onclick="switchTab('tasks-sec', 'tab2')">💰 المهام</div>
</nav>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();

    let score = parseFloat(localStorage.getItem('binasou_bal')) || 0;
    
    function render() {
        document.getElementById('balance').innerText = Math.floor(score).toLocaleString();
        localStorage.setItem('binasou_bal', score);
    }

    // نظام النقر
    document.getElementById('coinBtn').addEventListener('touchstart', (e) => {
        e.preventDefault();
        score++;
        render();
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
    });

    // التبديل بين التعدين والمهام (هذا هو الحل)
    function switchTab(sectionId, tabId) {
        // إخفاء الأقسام
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        // إلغاء تفعيل الأزرار
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        
        // إظهار القسم المطلوب
        document.getElementById(sectionId).classList.add('active');
        // تفعيل الزر المطلوب
        document.getElementById(tabId).classList.add('active');
    }

    function invite() {
        tg.openTelegramLink("https://t.me/share/url?url=https://t.me/binasou_win_bot&text=كن من النخبة واجمع الذهب مع BINASOU!");
    }

    render();
</script>
</body>
</html>
