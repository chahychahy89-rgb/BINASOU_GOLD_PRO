<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Binasou Pro Gold</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.js"></script>
    <style>
        :root { --gold: #FFD700; --bg: #0d0d0d; --card: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; text-align: center; overflow: hidden; }
        .header { padding: 15px; background: #111; border-bottom: 2px solid var(--gold); }
        .balance { font-size: 40px; color: var(--gold); font-weight: bold; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #151515; display: flex; border-top: 1px solid #333; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; padding: 15px; color: #888; font-size: 14px; cursor: pointer; }
        .nav-item.active { color: var(--gold); background: #1a1a1a; border-top: 2px solid var(--gold); }
        .section { display: none; padding: 20px; height: 75vh; overflow-y: auto; }
        .section.active { display: block; }
        .task-card { background: var(--card); padding: 15px; margin: 10px 0; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        .btn-action { background: var(--gold); color: black; padding: 8px 15px; border-radius: 8px; font-weight: bold; border: none; }
        .coin-btn { width: 200px; height: 200px; background: radial-gradient(circle, #ffec8b, #b8860b); border-radius: 50%; border: 8px solid #222; box-shadow: 0 0 20px var(--gold); margin: 30px auto; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-size: 12px; color: #888;">رصيد عملات BINASOU</div>
    <div class="balance" id="score">0</div>
</div>

<div id="mine" class="section active">
    <div class="coin-btn" onclick="tap()"></div>
    <p style="color: #4caf50;">التعدين نشط.. ✨</p>
</div>

<div id="tasks" class="section">
    <h2 style="color:var(--gold)">المهام والمكافآت 💰</h2>
    <div class="task-card">
        <div>
            <div style="font-weight:bold;">مشاهدة إعلان فيديو</div>
            <div style="color:var(--gold); font-size:12px;">+1,000 عملة</div>
        </div>
        <button class="btn-action" onclick="showRewardAd()">تنفيذ</button>
    </div>
    <div class="task-card">
        <div>
            <div style="font-weight:bold;">دعوة صديق جديد</div>
            <div style="color:var(--gold); font-size:12px;">+5,000 عملة</div>
        </div>
        <button class="btn-action" onclick="invite()">دعوة</button>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="tab('mine', this)">⛏️ تعدين</div>
    <div class="nav-item" onclick="tab('tasks', this)">💰 المهام</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    let score = parseFloat(localStorage.getItem('b_score')) || 0;
    const AdController = window.Adsgram.init({ blockId: "28090" });

    function tap() { score++; updateUI(); tg.HapticFeedback.impactOccurred('medium'); }
    function updateUI() { document.getElementById('score').innerText = Math.floor(score).toLocaleString(); localStorage.setItem('b_score', score); }
    function tab(id, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }
    function showRewardAd() {
        AdController.show().then(() => { score += 1000; updateUI(); alert("ربحت 1000 نقطة!"); })
        .catch(() => { alert("الإعلان غير جاهز"); });
    }
    function invite() {
        tg.openTelegramLink("https://t.me/share/url?url=https://t.me/binasou_win_bot&text=اربح العملات معي!");
    }
    updateUI();
</script>
</body>
</html>
