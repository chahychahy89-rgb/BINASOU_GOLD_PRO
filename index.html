<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BINASOU PREMIER</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #FFD700; --dark: #0a0a0a; --card: #161616; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 0; overflow: hidden; }
        
        .header { padding: 20px; background: var(--dark); border-bottom: 1px solid #222; text-align: center; }
        #balance { font-size: 50px; color: var(--gold); font-weight: 900; display: block; }

        .container { height: 70vh; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .page { display: none; }
        .active-page { display: block; animation: fadeIn 0.3s ease; }

        /* العملة */
        .coin-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        .main-coin { 
            width: 240px; height: 240px; border-radius: 50%;
            background: radial-gradient(circle, #ffe047 0%, #b8860b 70%);
            border: 8px solid #1a1a1a; box-shadow: 0 0 40px rgba(255, 215, 0, 0.2);
            display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.05s;
        }
        .main-coin:active { transform: scale(0.94); }
        .coin-inner { color: black; font-size: 30px; font-weight: 900; }

        /* المهام والنخبة */
        .task-card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .btn-action { background: var(--gold); color: black; border: none; padding: 10px 18px; border-radius: 8px; font-weight: bold; }

        /* شريط التنقل */
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #050505; border-top: 1px solid #222; padding-bottom: 30px; }
        .nav-item { flex: 1; padding: 15px; text-align: center; color: #555; font-weight: bold; cursor: pointer; }
        .nav-item.active { color: var(--gold); border-top: 3px solid var(--gold); background: rgba(255, 215, 0, 0.05); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</
