<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BINASOU GOLD</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #FFD700; --bg: #000; --card: #111; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 0; text-align: center; overflow: hidden; user-select: none; }
        
        /* الهيدر الثابت */
        .header { padding: 25px; background: #080808; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 10; }
        .balance-value { font-size: 55px; color: var(--gold); font-weight: bold; }

        /* حاوي الصفحات */
        .page { display: none; height: calc(100vh - 180px); overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .active-page { display: block; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* صفحة التعدين */
        .coin-btn { 
            width: 250px; height: 250px; border-radius: 50%;
            background: radial-gradient(circle, #ffe047 0%, #b8860b 70%); 
            border: 8px solid #1a1a1a; box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
            display: flex; align-items: center; justify-content: center;
            margin: 40px auto; cursor: pointer; transition: transform 0.05s;
        }
        .coin-btn:active { transform: scale(0.92); }
        .coin-text { color: #000; font-size: 35px; font-weight: 900; }

        /* صفحة المهام والدعوة */
        .section-title { color: var(--gold); margin-bottom: 20px; font-size: 22px; }
        .card { 
            background: var(--card); padding: 15px; border-radius: 15px; 
            margin-bottom: 12px; display: flex; justify-content: space-between; 
            align-items: center; border: 1px solid #222;
        }
        .reward { color: var(--gold); font-weight: bold; }
        .action-btn { background: var(--gold); color: #000; border: none; padding: 10px 18px; border-radius: 10px; font-weight: bold; }

        /* شريط التنقل */
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #050505; border-top: 1px solid #222; padding-bottom: 25px; }
        .nav-item { flex: 1; padding: 15px; color: #555; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--gold); border-top: 3px solid var(--gold); background: rgba(255,215,0,0.05); }
    </style>
</head>
<body>

<div class="header">
    <div style="font-size: 12px; color: #888;">رصيد BINASOU</div>
    <div id="balance" class="balance-value">0</div>
</div>

<div id="mining-page" class="page active-page">
    <div class="coin-btn" id="tap">
        <span class="coin-text">BINASOU</span>
    </div>
    <p style="color: var(--gold); font-weight: bold;">⚡ انقر لتجميع الذهب</p>
</div>

<div id="tasks-page" class="page">
    <h3 class="section-title">قائمة المهام 💰</h3>
    <div class="card">
        <div style="text-align:right;"><span>مشاهدة إعلان</span><br><span class="reward">+1,000</span></div>
        <button class="action-btn" onclick="tg.showAlert('ستتوفر الإعلانات قريباً!')">تنفيذ</button>
    </div>
    <div class="card">
        <div style="text-align:right;"><span>متابعة قناة التليجرام</span><br><span class="reward">+5,000</span></div>
        <button class="action-btn" onclick="window.open('https://t.me/your_channel')">انضم</button>
    </div>
</div>

<div id="friends-page" class="page">
    <h3 class="section-title">دعوة الأصدقاء 👥</h3>
    <div class="card" style="flex-direction: column; gap: 15px;">
        <p>اربح 10,000 عملة عن كل صديق تدعوه!</p>
        <button class="action-btn" style="width: 100%;" onclick="invite()">إرسال رابط الدعوة</button>
    </div>
</div>

<nav class="nav">
    <div class="nav-item active" id="btn-mining" onclick="showPage('mining-page', 'btn-mining')">⛏️ تعدين</div>
