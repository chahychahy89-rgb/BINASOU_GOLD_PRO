<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BINASOU PRO OFFICIAL</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.js"></script>
    <style>
        :root { --gold: #FFD700; --bg: #000; --card: #161616; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; text-align: center; overflow: hidden; }
        .header { padding: 20px; border-bottom: 1px solid #333; }
        .balance-label { font-size: 12px; color: #888; }
        .balance-value { font-size: 45px; color: var(--gold); font-weight: bold; margin-top: 5px; }
        .section { display: none; height: 75vh; padding: 20px; overflow-y: auto; }
        .active { display: block; }
        .task-card { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .btn-gold { background: var(--gold); color: black; border: none; padding: 10px 18px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; display: flex; background: #0a0a0a; border-top: 1px solid #333; padding-bottom: 10px; }
        .nav-item { flex: 1; padding: 15px; color: #888; font-size: 14px; cursor: pointer; }
        .nav-item.active { color: var(--gold); border-top: 2px solid var(--gold); }
        .coin-btn { width: 220px; height: 220px; background: radial-gradient(circle, #ffec8b, #b8860b); border-radius: 50%; border: 6px solid #fff; box-shadow: 0 0 25px var(--gold); margin: 40px auto; cursor: pointer; }
    </style>
</head>

    <div class="balance-label">رصيد عملات BINASOU</div>
    <div class="balance-value" id="score">0</div>
</div>

    <div class="coin-btn" onclick="handleTap()"></div>
    <p style="color:var(--gold)">💰 انقر لتجميع العملات</p>
</div>
