<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    const AdController = window.Adsgram.init({ blockId: "28090" });

    let score = parseFloat(localStorage.getItem('binasou_bal')) || 0;

    function mineClick() {
        score += 1;
        render();
        tg.HapticFeedback.impactOccurred('medium');
    }

    function watchAd() {
        AdController.show().then(() => {
            score += 1000; render(); alert("مبروك! ربحت 1,000 عملة");
        }).catch(() => { alert("الإعلان غير جاهز بعد.."); });
    }

    function changeTab(id, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    function render() {
        document.getElementById('balance').innerText = Math.floor(score).toLocaleString();
        localStorage.setItem('binasou_bal', score);
    }

    function inviteFriend() {
        tg.openTelegramLink("https://t.me/share/url?url=https://t.me/binasou_win_bot&text=انضم واربح الذهب!");
    }

    render();
</script>
</body>
</html>
