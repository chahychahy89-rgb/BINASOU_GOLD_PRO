<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Binasou Pro Gold</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.js"></script>
    <style>
        :root { --gold: #FFD700; --bg: #0d0d0d; --card: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; }
        
        /* Header */
        .header { padding: 15px; background: #111; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 100; }
        .balance-title { font-size: 14px; color: #888; }
        .balance-value { font-size: 38px; color: var(--gold); font-weight: bold; }

        /* Navigation */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #151515; display: flex; border-top: 1px solid #333; padding-bottom: 10px; }
        .nav-item { flex: 1; padding: 12px; color: #888; cursor: pointer; transition: 0.3s; font-size: 13px; }
        .nav-item.active { color: var(--gold); border-top: 3px solid var(--gold); background: #1a1a1a; }
        .nav-icon { font-size: 20px; display: block; margin-bottom: 4px; }

        /* Content Sections */
        .section { display: none; padding: 20px; margin-bottom: 80px; animation: fadeIn 0.4s; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Mining Section */
        .coin-btn { width: 220px; height: 220px; background: radial-gradient(circle, #ffec8b, #b8860b); border-radius: 50%; border: 8px solid #222; box-shadow: 0 0 30px var(--gold); margin: 40px auto; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: bold; color: #000; }
        .coin-btn:active { transform: scale(0.95); }

        /* Task Cards */
        .task-card { background: var(--card); padding: 15px; margin: 10px 0; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        .task-info { text-align: right; }
        .task-name { font-weight: bold; font-size: 15px; display: block; }
        .task-reward { color: var(--gold); font-size: 13px; }
