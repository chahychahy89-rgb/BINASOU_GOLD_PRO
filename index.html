</div>
        <button class="btn-play" onclick="runAd()">تنفيذ</button>
    </div>
    <div class="task-box">
        <div class="task-info">
            <span class="task-name">دعوة صديق</span>
            <span class="task-reward">+5,000 BINASOU</span>
        </div>
        <button class="btn-play" onclick="doInvite()">دعوة</button>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-btn active" onclick="openPage('mine-tab', this)">⛏️ تعدين</div>
    <div class="nav-btn" onclick="openPage('task-tab', this)">💰 المهام</div>
</div>

<script>
    const tgApp = window.Telegram.WebApp;
    tgApp.expand();

    // تشغيل نظام الإعلانات بمعرفك
    const AdPlayer = window.Adsgram.init({ blockId: "28090" });

    let myScore = parseFloat(localStorage.getItem('b_score')) || 0;

    function doTap() {
        myScore += 1;
        refreshUI();
        tgApp.HapticFeedback.impactOccurred('medium');
    }

    function runAd() {
        AdPlayer.show().then(() => {
            myScore += 1000; refreshUI(); alert("مبروك! تمت إضافة 1,000 عملة");
        }).catch(() => { alert("الإعلان قيد التجهيز.. حاول مجدداً"); });
    }

    function openPage(pageId, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        btn.classList.add('active');
    }

    function refreshUI() {
        document.getElementById('user-score').innerText = Math.floor(myScore).toLocaleString();
        localStorage.setItem('b_score', myScore);
    }

    function doInvite() {
        tgApp.openTelegramLink("https://t.me/share/url?url=https://t.me/binasou_win_bot&text=تعال عدن عملة BINASOU معي!");
    }

    refreshUI();
</script>
</body>
</html>
