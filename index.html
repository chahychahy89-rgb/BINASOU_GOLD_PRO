<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BINASOU GOLD</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* إجبار الخلفية السوداء ومنع أي تداخل */
        html, body { background: #000 !important; color: #fff !important; margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; }
        
        /* الهيدر */
        .top-bar { padding: 20px; text-align: center; border-bottom: 1px solid #222; background: #080808; }
        .score { font-size: 50px; color: #FFD700; font-weight: bold; display: block; }

        /* الصفحات */
        .page { display: none; padding: 20px; height: 70vh; overflow-y: auto; }
        .active-page { display: block !important; }

        /* زر النقر الكبير */
        .main-coin { 
            width: 220px; height: 220px; border-radius: 50%; margin: 40px auto;
            background: radial-gradient(circle, #ffe047 0%, #b8860b 70%);
            border: 8px solid #1a1a1a; box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .main-coin:active { transform: scale(0.95); }

        /* تصميم كروت المهام */
        .task-item { 
            background: #111; border: 1px solid #222; border-radius: 12px; 
            padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
        }
        .btn-gold { background: #FFD700; color: #000; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* شريط التنقل السفلي الثابت */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; display: flex; 
            background: #050505; border-top: 1px solid #222; padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-tab { flex: 1; padding: 15px; text-align: center; color: #555; font-weight: bold; cursor: pointer; }
        .nav-tab.active { color: #FFD700; border-top: 2px solid #FFD700; background: rgba(255, 215, 0, 0.05); }
    </style>
</head>
<body>

<div class="top-bar">
    <span style="font-size: 12px; color: #888;">رصيد BINASOU</span>
    <span id="balance" class="score">0</span>
</div>

<div id="p-mine" class="page active-page">
    <div class="main-coin" id="coin">
        <span style="color:#000; font-size:30px; font-weight:900;">BINASOU</span>
    </div>
    <p style="color:#FFD700;">⚡ انقر لتجميع الذهب</p>
</div>

<div id="p-tasks" class="page">
    <h3 style="color:#FFD700;">المهام اليومية</h3>
    <div class="task-item">
        <div style="text-align:right;"><span>متابعة قناتنا</span><br><small style="color:#FFD700;">+5,000</small></div>
        <button class="btn-gold" onclick="window.open('https://t.me/your_channel')">انضم</button>
    </div>
    <div class="task-item">
        <div style="text-align:right;"><span>دعوة صديق</span><br><small style="color:#FFD700;">+10,000</small></div>
        <button class="btn-gold" onclick="invite()">دعوة</button>
    </div>
</div>

<div class="bottom-nav">
    <div id="t-mine" class="nav-tab active" onclick="go('p-mine', 't-mine')">⛏️ تعدين</div>
