function runAd() {
        if (typeof Adsgram !== 'undefined') {
            const ad = Adsgram.init({ blockId: "28090" });
            ad.show().then(() => { score += 1000; update(); }).catch(() => { alert("الإعلان غير جاهز"); });
        } else {
            alert("نظام الإعلانات معطل حالياً");
        }
    }

    update();
</script>
